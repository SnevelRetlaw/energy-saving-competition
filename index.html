<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS for reading Excel files -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Keep any inline styles that aren't in styles.css if necessary, 
           though most should be moved to styles.css for consistency */
        body { font-family: sans-serif; background-color: #f3f4f6; }
        .loader { border-top-color: #3498db; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-7xl mx-auto dashboard-container">
    <h1 class="text-3xl font-bold mb-6 text-gray-800 page-title">🏆 Challenge Dashboard</h1>

    <!-- Dashboard Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 dashboard-grid">
        
        <!-- Tile 1: Daily Activity -->
        <div class="tile">
            <div class="tile-header">
                📊 Daily Energy Insight
                <span class="text-xs text-gray-500 tile-subtext">Coming soon</span>
            </div>
            <div class="placeholder-content">
                <div>
                    <svg class="w-12 h-12 mx-auto mb-2 placeholder-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                    <p>Daily activity metrics will appear here</p>
                </div>
            </div>
        </div>

        <!-- Tile 2: Challenges -->
        <div class="tile">
            <div class="tile-header">
                🎯 Challenges
                <button class="refresh-btn">Refresh</button>
            </div>
            <div id="challenges-container" class="flex-1 overflow-y-auto table-wrapper">
                <ul id="challenges-list" class="challenge-list">
                    <li class="text-center py-4 empty-state">Loading...</li>
                </ul>
            </div>
        </div>

        <!-- Tile 3: Leaderboards -->
        <div class="tile">
            <div class="tile-header">
                🥇 Leaderboard
                <button class="refresh-btn">Refresh</button>
            </div>
            <div id="leaderboard-container" class="flex-1 overflow-x-auto table-wrapper">
                <table class="min-w-full bg-white border border-gray-200 data-table">
                    <thead>
                        <tr class="bg-gray-100">
                            <th class="py-2 px-4 border-b text-left">Rank</th>
                            <th class="py-2 px-4 border-b text-left">Username</th>
                            <th class="py-2 px-4 border-b text-right">Score</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <tr><td colspan="3" class="text-center py-4 empty-state">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Tile 4: Graph -->
        <div class="tile">
            <div class="tile-header">
                📈 Usage Graph
                <span class="text-xs text-gray-500 tile-subtext">Coming soon</span>
            </div>
            <div class="placeholder-content">
                <div>
                    <svg class="w-12 h-12 mx-auto mb-2 placeholder-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path>
                    </svg>
                    <p>Usage graph will appear here</p>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Modular Logic Imports -->
<script type="module">
    import { initLeaderboard } from './logic/leaderboard.js';
    import { initChallenges } from './logic/challenges.js';
    import { initDailyEnergyInsight } from './logic/daily-energy-insight.js';
    import { initUsageGraph } from './logic/usage-graph.js';

    // --- Configuration ---
    const supabaseUrl = "https://bwkkobxbsfxlykhvhyiu.supabase.co";
    const supabaseKey = "sb_publishable_n3rZvLIFB23tn9teqoOc0A_tbmjl94r";
    
    // Initialize Supabase
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
    
    // Load data on page load
    document.addEventListener('DOMContentLoaded', () => {
        initLeaderboard(supabaseClient);
        initChallenges(supabaseClient);
        initDailyEnergyInsight(supabaseClient);
        initUsageGraph();
    });
</script>

</body>
</html>
