<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge Leaderboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS for reading Excel files -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; }
        .loader { border-top-color: #3498db; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-8">

<div class="max-w-4xl mx-auto bg-white shadow-md rounded-lg p-6">
    <h1 class="text-3xl font-bold mb-6 text-gray-800">🏆 Challenge Leaderboard</h1>

    <!-- Leaderboard Section -->
    <div>
        <h2 class="text-xl font-semibold mb-4">🥇 Current Standings</h2>
        <button onclick="fetchAndUpdateLeaderboard()" class="mb-4 text-sm bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded">Refresh List</button>
        
        <div id="leaderboard-container" class="overflow-x-auto">
            <table class="min-w-full bg-white border border-gray-200">
                <thead>
                    <tr class="bg-gray-100">
                        <th class="py-2 px-4 border-b text-left">Rank</th>
                        <th class="py-2 px-4 border-b text-left">Username</th>
                        <th class="py-2 px-4 border-b text-right">Score</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr><td colspan="3" class="text-center py-4">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <br/>

    <div>
        <h2 class="text-xl font-semibold mb-4">Challenges</h2>
        
        <div id="challenges-container" class="overflow-x-auto">
            <ul id="challenges-list" class="min-w-full bg-white border border-gray-200">
                <li class="text-center py-4">Loading ...</li>
            </ul>
        </div>
    </div>
</div>

<script>
    // --- Configuration ---
    let supabaseUrl = "https://bwkkobxbsfxlykhvhyiu.supabase.co"
    let supabaseKey = "sb_publishable_n3rZvLIFB23tn9teqoOc0A_tbmjl94r"
    let supabaseClient = null;

    // Initialize Supabase
    supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
    fetchAndUpdateLeaderboard();
    fetchAndUpdateChallenges();

    async function fetchAndUpdateLeaderboard(){
        updateLeaderboard(await fetchLeaderboard())
    }

    async function fetchLeaderboard() {
        if (!supabaseClient) return;

        try {
            // Fetch users ordered by score descending
            const { data, error } = await supabaseClient
                .from('Participants')
                .select('*')
                .order('score', { ascending: false });

            if (error) throw error;

            return data

        } catch (err) {
            console.error(err);
            return
        }
    }

    function updateLeaderboard(leaderboard){
        const tbody = document.getElementById('leaderboard-body');

        if (!leaderboard){
            tbody.innerHTML = '<tr><td colspan="3" class="text-center py-4 text-gray-500">Could not retrieve data.</td></tr>';
            return;
        }
        if (leaderboard.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="text-center py-4 text-gray-500">No users found yet.</td></tr>';
            return;
        }

        tbody.innerHTML = '';

        leaderboard.forEach((house, index) => {
            const row = `
                <tr class="hover:bg-gray-50">
                    <td class="py-2 px-4 border-b font-bold">${index + 1}</td>
                    <td class="py-2 px-4 border-b">${house.house_name}</td>
                    <td class="py-2 px-4 border-b text-right font-mono">${house.score}</td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
        
    }

    async function fetchAndUpdateChallenges(){
        updateChallenges(await fetchChallenges())
    }

    async function fetchChallenges(){
        if (!supabaseClient) return;

        try {
            const { data, error} = await supabaseClient.from("Challenges").select("*")
            return data
        } catch (err) {
            console.err(err)
            return
        }
    }

    function updateChallenges(challenges){
        const challengeList = document.getElementById("challenges-list")

        if (!challenges){
            challengeList.innerHTML = '<li>Fetching of challenges failed</li>'
        }
        if (challenges.length === 0){
            challengeList.innerHTML = '<li>No challenges yet</li>'
        }
        challengeList.innerHTML = ''
        challenges.forEach((challenge, index) => {
            const card = `
                <li class="border border-gray-200 rounded bg-white overflow-hidden">
                    <div class="p-4">
                        <div class="font-medium text-lg mb-1">${challenge.title}</div>
                        <div class="font-italic text-xs text-gray-800"><i>running from ${challenge.start} to ${challenge.end}</i></div>
                        <div class="text-gray-600 text-sm">${challenge.description}</div>
                    </div>
                </li>
            `
            challengeList.innerHTML += card
        })
    }

</script>

</body>
</html>
